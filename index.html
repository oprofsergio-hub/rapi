<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAPI Escolar Pro - Vanilla</title>
    <style>
      /* Basic styling for the app */
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f3f4f6;
        color: #333;
      }
      #app {
        display: flex;
        min-height: 100vh;
      }
      #sidebar {
        width: 200px;
        background-color: #1e3a8a;
        color: #fff;
        display: flex;
        flex-direction: column;
      }
      #sidebar h1 {
        padding: 20px;
        margin: 0;
        font-size: 20px;
        background-color: #2563eb;
      }
      #sidebar button {
        padding: 12px 16px;
        border: none;
        background: none;
        color: inherit;
        text-align: left;
        width: 100%;
        cursor: pointer;
        font-size: 14px;
      }
      #sidebar button.active {
        background-color: #2563eb;
      }
      #content {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background-color: #fafafa;
      }
      .tab {
        display: none;
      }
      .tab.active {
        display: block;
      }
      input[type="text"], input[type="number"], input[type="date"], select {
        padding: 6px 8px;
        margin-bottom: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 100%;
      }
      button.primary {
        background-color: #2563eb;
        color: #fff;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 6px;
      }
      button.danger {
        background-color: #dc2626;
        color: #fff;
        border: none;
        padding: 4px 8px;
        border-radius: 4px;
        cursor: pointer;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 12px;
      }
      table th, table td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      table th {
        background-color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <h1>RAPI Escolar</h1>
        <button data-tab="dashboard" class="active">Painel</button>
        <button data-tab="segments">Modalidades</button>
        <button data-tab="teachers">Professores</button>
        <button data-tab="classes">Turmas</button>
        <button data-tab="calendar">Calendário</button>
        <button data-tab="schedule">Grade Horária</button>
        <button data-tab="absences">Faltas</button>
        <button data-tab="reports">Relatórios</button>
      </aside>
      <main id="content">
        <section id="dashboard" class="tab active">
          <h2>Painel de Controle</h2>
          <div id="dashboard-content"></div>
        </section>
        <section id="segments" class="tab">
          <h2>Modalidades / Turnos</h2>
          <div id="segments-form"></div>
          <div id="segments-list"></div>
        </section>
        <section id="teachers" class="tab">
          <h2>Professores</h2>
          <div id="teachers-form"></div>
          <div id="teachers-list"></div>
        </section>
        <section id="classes" class="tab">
          <h2>Turmas</h2>
          <div id="classes-form"></div>
          <div id="classes-list"></div>
        </section>
        <section id="calendar" class="tab">
          <h2>Calendário</h2>
          <div id="calendar-controls"></div>
          <div id="calendar-grid"></div>
        </section>
        <section id="schedule" class="tab">
          <h2>Grade Horária</h2>
          <div id="schedule-controls"></div>
          <div id="schedule-grid"></div>
        </section>
        <section id="absences" class="tab">
          <h2>Lançar Falta</h2>
          <div id="absences-form"></div>
          <div id="absences-list"></div>
        </section>
        <section id="reports" class="tab">
          <h2>Relatórios</h2>
          <div id="reports-form"></div>
          <div id="reports-table"></div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
